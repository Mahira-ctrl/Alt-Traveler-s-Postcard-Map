<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alt-Traveler · Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cormorant+Garamond:wght@300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; background: #0a0c10; }

    /* ── VIDEO BACKGROUND ── */
    .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .bg video {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%; min-height: 100%;
      width: auto; height: auto; object-fit: cover;
    }
    .bg-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.58) 0%, rgba(0,0,0,0.22) 45%, rgba(0,0,0,0.0) 100%);
    }

    /* ── LAYOUT ── */
    .page {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: flex-start;
      min-height: 100vh; padding: 0 7%;
    }

    .card {
      width: 100%; max-width: 440px;
      animation: rise 1.2s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes rise { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

    .eyebrow {
      font-size: .6rem; font-weight: 500; letter-spacing: .3em;
      color: #c9a84c; text-transform: uppercase; margin-bottom: 1.4rem;
      opacity:0; animation: fi .8s .3s forwards;
    }
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem,5vw,3.4rem); font-weight: 700;
      color: #fff; line-height: 1.05; text-transform: uppercase;
      letter-spacing: .02em; margin-bottom: .4rem;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      opacity:0; animation: fi .8s .45s forwards;
    }
    .sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: .95rem; font-weight: 300; letter-spacing: .36em;
      color: rgba(255,255,255,.5); text-transform: uppercase;
      margin-bottom: 2rem;
      opacity:0; animation: fi .8s .6s forwards;
    }
    @keyframes fi { to { opacity: 1; } }

    /* ── AUTH MODE TOGGLE ── */
    .auth-toggle {
      display: flex; gap: 0; margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255,255,255,.15);
      opacity:0; animation: fi .8s .7s forwards;
    }
    .auth-toggle button {
      background: none; border: none; cursor: pointer;
      font-family: 'Montserrat', sans-serif; font-size: .58rem;
      font-weight: 500; letter-spacing: .22em; text-transform: uppercase;
      color: rgba(255,255,255,.35); padding: .6rem 0; margin-right: 2rem;
      position: relative; transition: color .3s;
    }
    .auth-toggle button::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
      height: 1px; background: #c9a84c;
      transform: scaleX(0); transition: transform .3s;
    }
    .auth-toggle button.active { color: #fff; }
    .auth-toggle button.active::after { transform: scaleX(1); }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── GOOGLE BUTTON ── */
    .google-section { opacity:0; animation: fi .8s .8s forwards; }

    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: .82rem 1.5rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.22);
      color: #fff; cursor: pointer;
      font-family: 'Montserrat', sans-serif; font-size: .62rem;
      font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
      transition: background .3s, border-color .3s;
      position: relative; overflow: hidden;
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.4);
    }
    .btn-google svg { flex-shrink: 0; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 1.6rem 0;
      opacity:0; animation: fi .8s .95s forwards;
    }
    .divider span {
      font-size: .5rem; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(255,255,255,.25); white-space: nowrap;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,.15);
    }

    /* ── FIELDS ── */
    .field { margin-bottom: 1.6rem; opacity:0; animation: fi .8s .85s forwards; }
    .field + .field { animation-delay: 1s; }
    .field label {
      display: block; font-size: .55rem; font-weight: 500;
      letter-spacing: .24em; color: rgba(255,255,255,.38);
      text-transform: uppercase; margin-bottom: .5rem;
    }
    .field input {
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid rgba(255,255,255,.28);
      padding: .48rem 0; color: #fff;
      font-family: 'Montserrat', sans-serif; font-size: .85rem;
      font-weight: 300; letter-spacing: .05em; outline: none;
      transition: border-color .3s;
    }
    .field input:focus { border-bottom-color: #c9a84c; }

    /* ── SIGN IN BUTTON ── */
    .btn-wrap { margin-top: 2rem; opacity:0; animation: fi .8s 1.1s forwards; }
    .btn {
      padding: .85rem 2.6rem; background: transparent;
      border: 1px solid rgba(201,168,76,.75); color: #c9a84c;
      font-family: 'Montserrat', sans-serif; font-size: .6rem;
      font-weight: 500; letter-spacing: .28em; text-transform: uppercase;
      cursor: pointer; position: relative; overflow: hidden;
      transition: color .3s, box-shadow .3s;
    }
    .btn::before {
      content:''; position:absolute; inset:0; background:#c9a84c;
      transform:translateX(-101%); transition:transform .35s cubic-bezier(.4,0,.2,1);
    }
    .btn:hover::before { transform:translateX(0); }
    .btn:hover { color:#0a0c10; box-shadow:0 6px 28px rgba(201,168,76,.3); }
    .btn span { position:relative; z-index:1; }

    .footer-text {
      margin-top:1.6rem; font-size:.55rem; letter-spacing:.15em;
      color:rgba(255,255,255,.22); text-transform:uppercase;
      opacity:0; animation: fi .8s 1.25s forwards;
    }
    .footer-text a { color:rgba(201,168,76,.6); text-decoration:none; transition:color .2s; }
    .footer-text a:hover { color:#c9a84c; }
  </style>
</head>
<body>

  <div class="bg">
    <video autoplay muted loop playsinline>
      <source src="clouds.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>
  </div>

  <div class="page">
    <div class="card">
      <p class="eyebrow">Ready for another journey?</p>
      <h1 class="headline">Call You,<br>Traveler?</h1>
      <p class="sub">What shall we</p>

      <!-- TOGGLE: Google / Email -->
      <div class="auth-toggle">
        <button class="active" onclick="switchTab('google')">Continue with Google</button>
        <button onclick="switchTab('email')">Sign in with Email</button>
      </div>

      <!-- GOOGLE PANEL -->
      <div class="panel active" id="panel-google">
        <div class="google-section">
          <button class="btn-google" onclick="handleGoogle()">
            <!-- Google G logo SVG -->
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            <span>Continue with Google</span>
          </button>
        </div>

        <div class="divider"><span>or sign in with email instead</span></div>

        <div style="opacity:0;animation:fi .8s 1.05s forwards;">
          <a href="#" onclick="switchTab('email'); return false;"
             style="font-size:.57rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(201,168,76,.7);text-decoration:none;transition:color .2s;"
             onmouseover="this.style.color='#c9a84c'" onmouseout="this.style.color='rgba(201,168,76,.7)'">
            Use email &amp; password →
          </a>
        </div>
      </div>

      <!-- EMAIL PANEL -->
      <div class="panel" id="panel-email">
        <div class="field">
          <label for="email">Username / Email</label>
          <input type="email" id="email" autocomplete="email"/>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password"/>
        </div>
        <div class="btn-wrap">
          <button class="btn"><span>Sign In</span></button>
        </div>

        <div style="margin-top:1.2rem;opacity:0;animation:fi .8s 1.2s forwards;">
          <a href="#" onclick="switchTab('google'); return false;"
             style="font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.28);text-decoration:none;transition:color .2s;"
             onmouseover="this.style.color='rgba(255,255,255,.5)'" onmouseout="this.style.color='rgba(255,255,255,.28)'">
            ← Back to Google sign-in
          </a>
        </div>
      </div>

      <p class="footer-text">New to the journey? <a href="#">Create an account</a></p>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      // update toggle buttons
      document.querySelectorAll('.auth-toggle button').forEach((btn, i) => {
        btn.classList.toggle('active', (tab === 'google' && i === 0) || (tab === 'email' && i === 1));
      });
      // show/hide panels
      document.getElementById('panel-google').classList.toggle('active', tab === 'google');
      document.getElementById('panel-email').classList.toggle('active', tab === 'email');
    }

    function handleGoogle() {
      // Wire up your Google OAuth here
      // e.g. window.location.href = '/auth/google';
      alert('Connect your Google OAuth endpoint here.');
    }
  </script>

</body>
</html>
